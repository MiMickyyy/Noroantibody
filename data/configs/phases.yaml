phases:
  phase0_smoke:
    description: "End-to-end smoke test on 1 campaign x 1 H1 x 1 H3"
    campaign_count: 1
    h1_delta_subset: [0]
    h3_delta_subset: [0]
    backbones_per_combination: 1
    sequences_per_backbone: 1
  phase1_coarse_pilot:
    description: "45 combinations, 8 backbones each, 1 sequence per backbone"
    campaign_count: all
    h1_delta_subset: all
    h3_delta_subset: all
    backbones_per_combination: 8
    sequences_per_backbone: 1
  phase2_focused_pilot:
