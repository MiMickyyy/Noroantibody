project:
  name: "stage1_5O04_hotspot_transfer_rf2_only"
  random_seed: 20260609
  gpu:
    type: "A100_or_H100_or_P100"
    count: 1

inputs:
  vp1_sequence_file: "VP1.prot"
  p_domain_dimer_sequence_file: "P-domain dimer.prot"
  nanobody_sequence_file: "Nanobody.fa"
  nanobody_framework_pdb_file: "data/raw/sanitized/Nanobody_HLT.pdb"
  local_antigen_structure_file: "data/target/antigen_full_cleaned_AB.pdb"

target_prep:
  antigen_chain_ids: [A, B]
  numbering_mode: "full_vp1"
  note: "RF2-only fallback for 5O04-informed Stage1 while AF3 model weights are unavailable."

stage1_5o04:
  core_hotspots_crop: [49, 53, 238, 241, 243]
  core_hotspots_full_vp1: [273, 277, 462, 465, 467]
  monitoring_epitope_crop: [48, 49, 53, 238, 239, 240, 241, 243]
  monitoring_epitope_full_vp1: [272, 273, 277, 462, 463, 464, 465, 467]
  cdr1_lengths: [10, 11, 12, 13, 14]
  cdr3_lengths: [8, 9, 10, 11, 12]
  design_groups:
    - cdr13_only
    - cdr13_flank_flexible
  backbones_per_condition: 30
  sequences_per_backbone: 1
  expected_conditions: 50
  expected_designs: 1500
  scientific_goal: "5O04-informed WT-like interface transfer with primary CDR1 and supporting CDR3 redesign; CDR2 fixed. AF3Score disabled because AF3 model weights are unavailable."

execution:
  dry_run_default: false
  resume_default: true
  max_gpu_parallel_jobs: 1
  fail_fast: false
  memory_safe:
    cleanup_mode: "after_each_condition"
    retain_failed_relaxed: "metadata_only"
    retain_rf2_relaxed_pass: "required_inputs_and_metrics"
    retain_top_structures: true
    retain_all_raw_intermediates: false
    max_memory_gb: 50

filters:
  hard_thresholds:
    rf2_pae_max: 10.0
    design_rf2_rmsd_max: 2.0
  relaxed_thresholds:
    rf2_pae_max: 12.0
    design_rf2_rmsd_max: 2.5
  ranking_weights:
    rf2_self_consistency: 0.40
    hotspot_agreement: 0.25
    docking_localization: 0.20
    structural_plausibility: 0.10
    h1_h3_role_consistency: 0.05

af3score:
  enabled: false
  score_relaxed_only: true
  ranking_weights:
    rf2: 1.00
    af3score: 0.00

postprocess:
  sequence_dedup_identity_threshold: 0.95
  structural_clustering_enabled: false
